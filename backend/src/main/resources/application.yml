server:
  port: 8080

spring:
  application:
    name: the-crime

# Gemini AI Configuration
gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemini-2.5-flash
  base-url: https://generativelanguage.googleapis.com/v1beta

# Game Configuration
game:
  max-players: 8
  min-players: 3
  room-code-length: 6

# CORS
cors:
  allowed-origins: http://localhost:3000
